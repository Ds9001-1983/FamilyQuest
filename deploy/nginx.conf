# =============================================================================
# LevelMission - Nginx Konfiguration
# =============================================================================
# Diese Datei dient als Referenz. Die setup-app.sh erstellt automatisch
# eine angepasste Konfiguration basierend auf deiner Domain.
# =============================================================================

upstream levelmission_backend {
    server 127.0.0.1:5000;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name deine-domain.de www.deine-domain.de;

    # Logs
    access_log /var/log/nginx/levelmission.access.log;
    error_log /var/log/nginx/levelmission.error.log;

    # Sicherheits-Header
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip Kompression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;

    # Proxy zum Node.js Backend
    location / {
        proxy_pass http://levelmission_backend;
        proxy_http_version 1.1;

        # WebSocket Support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Header
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_cache_bypass $http_upgrade;
    }

    # Statische Assets cachen (30 Tage)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        proxy_pass http://levelmission_backend;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # PWA Manifest und Service Worker
    location /manifest.json {
        proxy_pass http://levelmission_backend;
        add_header Cache-Control "no-cache";
    }

    location /sw.js {
        proxy_pass http://levelmission_backend;
        add_header Cache-Control "no-cache";
    }
}

# =============================================================================
# HTTPS-Konfiguration (wird von Certbot automatisch hinzugefügt)
# =============================================================================
# Nach dem Ausführen von:
#   sudo certbot --nginx -d deine-domain.de
#
# Wird diese Datei automatisch erweitert um:
# - SSL-Zertifikate
# - HTTPS-Redirect
# - Moderne SSL-Konfiguration
# =============================================================================
